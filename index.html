<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CampusVibe — College Events</title>
  <meta name="description" content="Discover and join exciting college events, hackathons, seminars, and workshops">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body>

  <div class="container page">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar__greeting">
        <p class="text-sm" id="greetingTime">Good morning</p>
        <h2 id="greetingName">Welcome!</h2>
      </div>
      <div class="top-bar__actions">
        <a href="profile.html" class="btn btn-icon btn-ghost">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </a>
      </div>
    </div>

    <!-- Immediate Notices -->
    <div id="noticeSection"></div>

    <!-- Featured Slider -->
    <section class="mb-20">
      <div class="section-title">
        <span>✨ Highlight Sessions</span>
      </div>
      <div class="swiper featured-swiper">
        <div class="swiper-wrapper" id="featuredSlider"></div>
        <div class="swiper-pagination"></div>
      </div>
    </section>

    <!-- Upcoming Events -->
    <section class="mb-20">
      <div class="section-title">
        <span>🔥 Upcoming Events</span>
        <a href="#" class="see-all">See All</a>
      </div>
      <div class="scroll-row" id="upcomingEvents"></div>
    </section>

    <!-- Completed Events -->
    <section class="mb-20">
      <div class="section-title">
        <span>✅ Completed Events</span>
      </div>
      <div class="scroll-row" id="completedEvents"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
