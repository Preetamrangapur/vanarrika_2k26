<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusVibe — Redirecting...</title>
  <meta name="description" content="CampusVibe — College Event Management Platform">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B0D1A">
  <style>
    body { background: #0B0D1A; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; color: #F0F0F8; }
    .loader { text-align: center; }
    .loader__icon { font-size: 3rem; margin-bottom: 16px; animation: pulse 1.5s infinite; }
    .loader__text { font-size: .9rem; color: #8B8FA3; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="loader__icon">🎪</div>
    <div class="loader__text">Redirecting to your dashboard...</div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect to the appropriate dashboard based on role
    const user = getCurrentUser();
    if (user) {
      redirectToDashboard(user.role);
    } else {
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
