<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Teacher Management — CampusVibe Admin</title>
  <meta name="description" content="Manage teacher accounts — approve, reject, and delete teachers">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body>

  <div class="container page">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar__greeting">
        <a href="admin.html" class="btn btn-icon btn-ghost" style="margin-right: 8px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div>
          <p class="text-sm">Admin Panel</p>
          <h2>👨‍🏫 Teacher Management</h2>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="teacherStats"></div>

    <!-- Tabs -->
    <div class="tabs mt-16">
      <button class="tab active" data-tab="all" onclick="switchTeacherTab('all')">All</button>
      <button class="tab" data-tab="pending" onclick="switchTeacherTab('pending')">Pending</button>
      <button class="tab" data-tab="approved" onclick="switchTeacherTab('approved')">Approved</button>
    </div>

    <!-- Teacher List -->
    <div class="data-list mt-16" id="teacherList"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/teacher-management.js"></script>
</body>
</html>
