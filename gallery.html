<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gallery — CampusVibe</title>
  <meta name="description" content="Explore memories from college events, hackathons, and cultural fests">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body>

  <div class="container page">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar__greeting">
        <p class="text-sm">📸 Campus Memories</p>
        <h2>Gallery</h2>
      </div>
    </div>

    <!-- Featured Highlights Carousel -->
    <section class="mb-20">
      <div class="section-title">
        <span>✨ Highlights</span>
        <span class="text-xs text-muted" id="highlightCount"></span>
      </div>
      <div class="swiper gallery-swiper">
        <div class="swiper-wrapper" id="gallerySlider"></div>
        <div class="swiper-pagination"></div>
      </div>
    </section>

    <!-- All Images Grid -->
    <section class="mb-20">
      <div class="section-title">
        <span>📷 All Photos</span>
        <span class="text-xs text-muted" id="photoCount"></span>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </section>
  </div>

  <!-- Image Lightbox -->
  <div class="gallery-lightbox" id="galleryLightbox">
    <button class="gallery-lightbox__close" onclick="closeLightbox()">&times;</button>
    <button class="gallery-lightbox__prev" onclick="prevImage()">‹</button>
    <img class="gallery-lightbox__img" id="lightboxImg" src="" alt="Gallery image">
    <button class="gallery-lightbox__next" onclick="nextImage()">›</button>
    <div class="gallery-lightbox__caption" id="lightboxCaption"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
