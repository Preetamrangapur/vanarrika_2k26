<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register — CampusVibe</title>
  <meta name="description" content="Create your CampusVibe account to discover and join college events">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
</head>
<body class="no-navbar">

  <div class="login-page">
    <div class="login-card glass-card register-card">
      <div class="login-card__logo">🎪</div>
      <h1>Create Account</h1>
      <p class="subtitle">Join CampusVibe and explore events</p>

      <!-- Role Toggle Tabs -->
      <div class="register-tabs">
        <button class="register-tab active" id="tabStudent" onclick="switchRegisterTab('student')">🎓 Student</button>
        <button class="register-tab" id="tabTeacher" onclick="switchRegisterTab('teacher')">👨‍🏫 Teacher</button>
      </div>

      <div id="registerError" class="login-card__error"></div>
      <div id="registerSuccess" class="login-card__error" style="background: rgba(0,201,167,0.1); border-color: rgba(0,201,167,0.3); color: #00C9A7;"></div>

      <!-- ========== STUDENT REGISTRATION FORM ========== -->
      <form id="studentForm" class="register-form">
        <div class="form-group">
          <label for="stuName">Full Name</label>
          <input type="text" id="stuName" class="form-input" placeholder="Enter your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="stuUSN">USN (University Seat Number)</label>
          <input type="text" id="stuUSN" class="form-input" placeholder="e.g. 1RV22CS101" required>
        </div>
        <div class="form-group">
          <label for="stuDept">Department</label>
          <input type="text" id="stuDept" class="form-input" placeholder="Enter your department" required>
        </div>
        <div class="form-group">
          <label for="stuEmail">Email Address</label>
          <input type="email" id="stuEmail" class="form-input" placeholder="you@college.edu" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="stuPassword">Password</label>
          <input type="password" id="stuPassword" class="form-input" placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="stuConfirm">Confirm Password</label>
          <input type="password" id="stuConfirm" class="form-input" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="stuRegisterBtn">Create Account</button>
      </form>

      <!-- ========== TEACHER REGISTRATION FORM ========== -->
      <form id="teacherForm" class="register-form" style="display: none;">
        <div class="form-group">
          <label for="tchName">Full Name</label>
          <input type="text" id="tchName" class="form-input" placeholder="Enter your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="tchPhone">Phone Number</label>
          <input type="tel" id="tchPhone" class="form-input" placeholder="e.g. 9876543210" required pattern="[0-9]{10}" title="Enter a valid 10-digit phone number">
        </div>
        <div class="form-group">
          <label for="tchEmpId">USN / Employee ID</label>
          <input type="text" id="tchEmpId" class="form-input" placeholder="e.g. T101" required>
        </div>
        <div class="form-group">
          <label for="tchDept">Department</label>
          <input type="text" id="tchDept" class="form-input" placeholder="Enter your department" required>
        </div>
        <div class="form-group">
          <label for="tchEmail">Email Address</label>
          <input type="email" id="tchEmail" class="form-input" placeholder="you@college.edu" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="tchPassword">Password</label>
          <input type="password" id="tchPassword" class="form-input" placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="tchConfirm">Confirm Password</label>
          <input type="password" id="tchConfirm" class="form-input" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password">
        </div>


        <button type="submit" class="btn btn-primary btn-block" id="tchRegisterBtn">Create Account</button>
      </form>

      <div class="login-card__divider">or</div>

      <button class="btn btn-ghost btn-block" onclick="loginAsGuest()">Continue as Guest</button>

      <p class="login-card__footer">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      const user = getCurrentUser();
      redirectToDashboard(user.role);
    }

    // ---- Tab Switching ----
    function switchRegisterTab(tab) {
      const errEl = document.getElementById('registerError');
      const sucEl = document.getElementById('registerSuccess');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      document.getElementById('tabStudent').classList.toggle('active', tab === 'student');
      document.getElementById('tabTeacher').classList.toggle('active', tab === 'teacher');
      document.getElementById('studentForm').style.display = tab === 'student' ? 'block' : 'none';
      document.getElementById('teacherForm').style.display = tab === 'teacher' ? 'block' : 'none';
    }

    // ---- Helper: show error ----
    function showRegError(msg) {
      const el = document.getElementById('registerError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('registerSuccess').style.display = 'none';
    }

    // ---- Helper: show success ----
    function showRegSuccess(msg) {
      const el = document.getElementById('registerSuccess');
      el.innerHTML = msg;
      el.style.display = 'block';
      document.getElementById('registerError').style.display = 'none';
    }

    // ---- Helper: generate unique ID ----
    function genUserId() {
      return 'u' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
    }

    // ---- Helper: check email uniqueness ----
    function isEmailTaken(email) {
      const users = getUsers();
      const pending = getPendingTeachers();
      return users.some(u => u.email === email) || pending.some(u => u.email === email);
    }

    // ========== STUDENT REGISTRATION ==========
    document.getElementById('studentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('stuName').value.trim();
      const usn = document.getElementById('stuUSN').value.trim();
      const department = document.getElementById('stuDept').value;
      const email = document.getElementById('stuEmail').value.trim().toLowerCase();
      const password = document.getElementById('stuPassword').value;
      const confirm = document.getElementById('stuConfirm').value;

      // Validation
      if (!name || !usn || !department || !email || !password || !confirm) {
        showRegError('All fields are required');
        return;
      }
      if (password !== confirm) {
        showRegError('Passwords do not match');
        return;
      }
      if (isEmailTaken(email)) {
        showRegError('An account with this email already exists');
        return;
      }

      // Create student user
      const newUser = {
        id: genUserId(),
        name: name,
        usn: usn,
        department: department,
        email: email,
        password: password,
        role: 'student',
        avatar: ''
      };

      const users = getUsers();
      users.push(newUser);
      saveUsers(users);

      showRegSuccess('Account created successfully! Redirecting to login...');
      this.reset();

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    });

    // ========== TEACHER REGISTRATION ==========
    document.getElementById('teacherForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('tchName').value.trim();
      const phone = document.getElementById('tchPhone').value.trim();
      const employee_id = document.getElementById('tchEmpId').value.trim();
      const department = document.getElementById('tchDept').value;
      const email = document.getElementById('tchEmail').value.trim().toLowerCase();
      const password = document.getElementById('tchPassword').value;
      const confirm = document.getElementById('tchConfirm').value;

      // Validation
      if (!name || !phone || !employee_id || !department || !email || !password || !confirm) {
        showRegError('All fields are required');
        return;
      }
      if (password !== confirm) {
        showRegError('Passwords do not match');
        return;
      }
      if (isEmailTaken(email)) {
        showRegError('An account with this email already exists');
        return;
      }

      // Create teacher (pending approval)
      const newTeacher = {
        id: genUserId(),
        name: name,
        phone: phone,
        employee_id: employee_id,
        department: department,
        email: email,
        password: password,
        role: 'teacher',
        status: 'pending',
        requestedAt: new Date().toISOString(),
        coordinators: [],
        avatar: ''
      };

      const pending = getPendingTeachers();
      pending.push(newTeacher);
      savePendingTeachers(pending);

      showRegSuccess('⏳ Your teacher account has been submitted for admin approval.<br><strong>You will be able to log in once the admin approves your registration.</strong>');
      this.reset();
    });
  </script>
</body>
</html>
