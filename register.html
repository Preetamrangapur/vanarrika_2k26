<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register — EvonDrive</title>
  <meta name="description" content="Create your EvonDrive account to discover and join college events">
  <link rel="stylesheet" href="styles/login.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#050510">
</head>
<body>

  <!-- ========== Animated Background ========== -->
  <div class="login-bg" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <!-- ========== Dark/Light Toggle ========== -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="theme-toggle__icon">🌙</span>
    <span class="theme-toggle__label">Dark</span>
  </button>

  <!-- ========== Toast Container ========== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ========== Register Wrapper ========== -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo & Title -->
      <div class="login-card__logo"><img src="images/logo.png" alt="Logo" style="width: 80px; height: 80px; object-fit: contain; border-radius: 8px;"></div>
      <h1 class="login-card__title">Create Account</h1>
      <p class="login-card__subtitle">Join EvonDrive and explore events</p>

      <!-- Role Toggle Tabs -->
      <div class="register-tabs">
        <button class="register-tab active" id="tabStudent" onclick="switchRegisterTab('student')">🎓 Student</button>
        <button class="register-tab" id="tabTeacher" onclick="switchRegisterTab('teacher')">👨‍🏫 Teacher</button>
      </div>

      <!-- ========== STUDENT REGISTRATION FORM ========== -->
      <form id="studentForm" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="stuName" class="form-input" placeholder="Name" required autocomplete="name">
          <label for="stuName" class="floating-label">Full Name</label>
        </div>

        <!-- USN -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"></rect>
            <path d="M16 3h-8l-2 4h12l-2-4z"></path>
          </svg>
          <input type="text" id="stuUSN" class="form-input" placeholder="USN" required>
          <label for="stuUSN" class="floating-label">USN (University Seat Number)</label>
        </div>

        <!-- Department -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <input type="text" id="stuDept" class="form-input" placeholder="Dept" required>
          <label for="stuDept" class="floating-label">Department</label>
        </div>

        <!-- Email -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="M22 4l-10 8L2 4"></path>
          </svg>
          <input type="email" id="stuEmail" class="form-input" placeholder="Email" required autocomplete="email">
          <label for="stuEmail" class="floating-label">Email Address</label>
        </div>

        <!-- Password -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="stuPassword" class="form-input" placeholder="Password" required minlength="6" autocomplete="new-password" style="padding-right: 48px;">
          <label for="stuPassword" class="floating-label">Password</label>
          <button type="button" class="password-toggle" onclick="togglePwdVisibility('stuPassword', this)" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
            </svg>
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
          <input type="password" id="stuConfirm" class="form-input" placeholder="Confirm" required minlength="6" autocomplete="new-password" style="padding-right: 48px;">
          <label for="stuConfirm" class="floating-label">Confirm Password</label>
          <button type="button" class="password-toggle" onclick="togglePwdVisibility('stuConfirm', this)" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
            </svg>
          </button>
        </div>

        <button type="submit" class="btn btn-primary" id="stuRegisterBtn">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- ========== TEACHER REGISTRATION FORM ========== -->
      <form id="teacherForm" style="display: none;" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="tchName" class="form-input" placeholder="Name" required autocomplete="name">
          <label for="tchName" class="floating-label">Full Name</label>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <input type="tel" id="tchPhone" class="form-input" placeholder="Phone" required pattern="[0-9]{10}" title="Enter a valid 10-digit phone number">
          <label for="tchPhone" class="floating-label">Phone Number</label>
        </div>

        <!-- Employee ID -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"></rect>
            <path d="M16 3h-8l-2 4h12l-2-4z"></path>
          </svg>
          <input type="text" id="tchEmpId" class="form-input" placeholder="ID" required>
          <label for="tchEmpId" class="floating-label">USN / Employee ID</label>
        </div>

        <!-- Department -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <input type="text" id="tchDept" class="form-input" placeholder="Dept" required>
          <label for="tchDept" class="floating-label">Department</label>
        </div>

        <!-- Email -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="M22 4l-10 8L2 4"></path>
          </svg>
          <input type="email" id="tchEmail" class="form-input" placeholder="Email" required autocomplete="email">
          <label for="tchEmail" class="floating-label">Email Address</label>
        </div>

        <!-- Password -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="tchPassword" class="form-input" placeholder="Password" required minlength="6" autocomplete="new-password" style="padding-right: 48px;">
          <label for="tchPassword" class="floating-label">Password</label>
          <button type="button" class="password-toggle" onclick="togglePwdVisibility('tchPassword', this)" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
            </svg>
          </button>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <svg class="form-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
          <input type="password" id="tchConfirm" class="form-input" placeholder="Confirm" required minlength="6" autocomplete="new-password" style="padding-right: 48px;">
          <label for="tchConfirm" class="floating-label">Confirm Password</label>
          <button type="button" class="password-toggle" onclick="togglePwdVisibility('tchConfirm', this)" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
            </svg>
          </button>
        </div>

        <button type="submit" class="btn btn-primary" id="tchRegisterBtn">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- Sign In Link -->
      <p class="login-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </p>

    </div><!-- .login-card -->
  </div><!-- .login-wrapper -->

  <!-- ========== Scripts ========== -->
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      const user = getCurrentUser();
      redirectToDashboard(user.role);
    }

    // ---- Theme Toggle (same as login) ----
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('cv_theme');
    if (savedTheme === 'light') document.body.classList.add('light-mode');
    updateToggleLabel();

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('cv_theme', isLight ? 'light' : 'dark');
      updateToggleLabel();
    });

    function updateToggleLabel() {
      const isLight = document.body.classList.contains('light-mode');
      document.querySelector('.theme-toggle__icon').textContent = isLight ? '☀️' : '🌙';
      document.querySelector('.theme-toggle__label').textContent = isLight ? 'Light' : 'Dark';
    }

    // ---- Floating Label Logic ----
    document.querySelectorAll('.form-input').forEach(input => {
      const check = () => input.classList.toggle('has-value', input.value.length > 0);
      input.addEventListener('input', check);
      input.addEventListener('change', check);
      check();
    });

    // ---- Password Toggle ----
    function togglePwdVisibility(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
    }

    // ---- Toast ----
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
      toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // ---- Tab Switching ----
    function switchRegisterTab(tab) {
      document.getElementById('tabStudent').classList.toggle('active', tab === 'student');
      document.getElementById('tabTeacher').classList.toggle('active', tab === 'teacher');
      document.getElementById('studentForm').style.display = tab === 'student' ? 'block' : 'none';
      document.getElementById('teacherForm').style.display = tab === 'teacher' ? 'block' : 'none';
    }

    // ---- Helper: generate unique ID ----
    function genUserId() {
      return 'u' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
    }

    // ---- Helper: check email uniqueness ----
    function isEmailTaken(email) {
      const users = getUsers();
      const pending = getPendingTeachers();
      return users.some(u => u.email === email) || pending.some(u => u.email === email);
    }

    // ---- Set loading state ----
    function setLoading(btn, loading) {
      if (loading) {
        btn.classList.add('btn--loading');
      } else {
        btn.classList.remove('btn--loading');
      }
    }

    // ========== STUDENT REGISTRATION ==========
    document.getElementById('studentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('stuName').value.trim();
      const usn = document.getElementById('stuUSN').value.trim();
      const department = document.getElementById('stuDept').value.trim();
      const email = document.getElementById('stuEmail').value.trim().toLowerCase();
      const password = document.getElementById('stuPassword').value;
      const confirm = document.getElementById('stuConfirm').value;
      const btn = document.getElementById('stuRegisterBtn');

      // Validation
      if (!name || !usn || !department || !email || !password || !confirm) {
        showToast('All fields are required', 'error');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }
      if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
      }
      if (isEmailTaken(email)) {
        showToast('An account with this email already exists', 'error');
        return;
      }

      setLoading(btn, true);

      setTimeout(() => {
        // Create student user
        const newUser = {
          id: genUserId(),
          name: name,
          usn: usn,
          department: department,
          email: email,
          password: password,
          role: 'student',
          avatar: ''
        };

        const users = getUsers();
        users.push(newUser);
        saveUsers(users);

        setLoading(btn, false);
        showToast('Account created! Redirecting to login...', 'success');
        this.reset();
        document.querySelectorAll('.form-input').forEach(i => i.classList.remove('has-value'));

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      }, 800);
    });

    // ========== TEACHER REGISTRATION ==========
    document.getElementById('teacherForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('tchName').value.trim();
      const phone = document.getElementById('tchPhone').value.trim();
      const employee_id = document.getElementById('tchEmpId').value.trim();
      const department = document.getElementById('tchDept').value.trim();
      const email = document.getElementById('tchEmail').value.trim().toLowerCase();
      const password = document.getElementById('tchPassword').value;
      const confirm = document.getElementById('tchConfirm').value;
      const btn = document.getElementById('tchRegisterBtn');

      // Validation
      if (!name || !phone || !employee_id || !department || !email || !password || !confirm) {
        showToast('All fields are required', 'error');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }
      if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
      }
      if (isEmailTaken(email)) {
        showToast('An account with this email already exists', 'error');
        return;
      }

      setLoading(btn, true);

      setTimeout(() => {
        // Create teacher (pending approval)
        const newTeacher = {
          id: genUserId(),
          name: name,
          phone: phone,
          employee_id: employee_id,
          department: department,
          email: email,
          password: password,
          role: 'teacher',
          status: 'pending',
          requestedAt: new Date().toISOString(),
          coordinators: [],
          avatar: ''
        };

        const pending = getPendingTeachers();
        pending.push(newTeacher);
        savePendingTeachers(pending);

        setLoading(btn, false);
        showToast('⏳ Submitted for admin approval!', 'info');
        this.reset();
        document.querySelectorAll('.form-input').forEach(i => i.classList.remove('has-value'));
      }, 800);
    });
  </script>
</body>
</html>
